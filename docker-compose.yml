services:
  ingredient-db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ingredient-db
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DB_FILE: /data/ingredient.db
    volumes:
      - ingredient-db-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+process.env.PORT+'/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ingredient-db-data:
